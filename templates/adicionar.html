<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Unidade - Controle de Franquias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #dc0032;
            --primary-dark: #b8002a;
            --gray-50: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #495057;
            --gray-800: #212529;
        }
        
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: var(--gray-50);
            color: var(--gray-800);
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        
        .card-header {
            background: var(--primary);
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 1.5rem;
            border: none;
        }
        
        .card-header h4 {
            margin: 0;
            font-weight: 600;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--gray-600);
            font-size: 0.875em;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-control, .form-select {
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(220, 0, 50, 0.1);
        }
        
        .btn-success {
            background: #dc0032;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .btn-success:hover {
            background: #343a40;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 192, 87, 0.3);
        }
        
        .btn-outline-secondary {
            border: 2px solid var(--gray-200);
            color: var(--gray-600);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .btn-outline-secondary:hover {
            border-color: var(--gray-600);
            color: var(--gray-800);
            background: white;
        }
        
        h1 {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h1>🏢 Controle de Franquias</h1>
            <p class="text-muted">Cadastro de Nova Unidade</p>
        </div>
        
        <div class="card shadow">
            <div class="card-header">
                <h4>📝 Informações da Unidade</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">Nome da Unidade</label>
                        <input type="text" name="nome" class="form-control" required placeholder="Ex: São Paulo 01">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Cidade</label>
                        <input type="text" name="cidade" class="form-control" required placeholder="Ex: São Paulo">
                    </div>
                    
                    <div class="row">
                        <div class="col-6 mb-4">
                            <label class="form-label">UF</label>
                            <select name="uf" class="form-select" required>
                                <option value="">Selecione</option>
                                <option value="AC">Acre</option>
                                <option value="AL">Alagoas</option>
                                <option value="AP">Amapá</option>
                                <option value="AM">Amazonas</option>
                                <option value="BA">Bahia</option>
                                <option value="CE">Ceará</option>
                                <option value="DF">Distrito Federal</option>
                                <option value="ES">Espírito Santo</option>
                                <option value="GO">Goiás</option>
                                <option value="MA">Maranhão</option>
                                <option value="MT">Mato Grosso</option>
                                <option value="MS">Mato Grosso do Sul</option>
                                <option value="MG">Minas Gerais</option>
                                <option value="PA">Pará</option>
                                <option value="PB">Paraíba</option>
                                <option value="PR">Paraná</option>
                                <option value="PE">Pernambuco</option>
                                <option value="PI">Piauí</option>
                                <option value="RJ">Rio de Janeiro</option>
                                <option value="RN">Rio Grande do Norte</option>
                                <option value="RS">Rio Grande do Sul</option>
                                <option value="RO">Rondônia</option>
                                <option value="RR">Roraima</option>
                                <option value="SC">Santa Catarina</option>
                                <option value="SP">São Paulo</option>
                                <option value="SE">Sergipe</option>
                                <option value="TO">Tocantins</option>
                            </select>
                        </div>
                        <div class="col-6 mb-4">
                            <label class="form-label">Tipo</label>
                            <select name="tipo" class="form-select" required>
                                <option value="">Selecione</option>
                                {% for codigo, descricao in tipos_unidade.items() %}
                                    <option value="{{ codigo }}">{{ codigo }} - {{ descricao }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Status do Ciclo</label>
                        <select name="status_unidade" class="form-select">
                            {% for codigo, info in status_unidade_opts.items() %}
                                <option value="{{ codigo }}">{{ info.label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Salvar Unidade</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/" class="btn btn-outline-secondary">← Voltar para Home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
